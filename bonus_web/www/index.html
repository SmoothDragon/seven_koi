<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Koi — WASM bonus</title>
</head>
<body>
  <h1>Koi — digital bonus stub</h1>
  <p id="status">Building WASM… open DevTools if this hangs.</p>
  <script type="module">
    import init, { package_name, deck_vector, is_four_match } from '../pkg/koi_bonus.js';
    await init();
    const deck = deck_vector();
    const sample = [deck[0], deck[1], deck[2], deck[3]];
    document.getElementById('status').textContent =
      `${package_name()}: ${deck.length} cards; sample is_four_match( first 4 ) = ${is_four_match(...sample)} (expected false)`;
  </script>
</body>
</html>
